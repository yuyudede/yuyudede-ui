name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: yuyudede-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export and upload to COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
          COS_ACCELERATE: "true"
        run: |
          echo "Exporting image..."
          docker save yuyudede-ui:latest | gzip -1 > /tmp/image.tar.gz
          ls -lh /tmp/image.tar.gz
          echo "Uploading to COS..."
          python3 deploy/cos_transfer.py upload /tmp/image.tar.gz yuyudede-ui-latest.tar.gz

      - name: Copy deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/cos_transfer.py"
          target: "/opt/yuyudede"
          strip_components: 1

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
          COS_ACCELERATE: "true"
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: COS_SECRET_ID,COS_SECRET_KEY,COS_BUCKET,COS_REGION,COS_ACCELERATE
          command_timeout: 10m
          script: |
            set -e
            cd /opt/yuyudede

            echo "Downloading image from COS..."
            python3 cos_transfer.py download yuyudede-ui-latest.tar.gz /tmp/ui-image.tar.gz

            echo "Loading Docker image..."
            docker load < /tmp/ui-image.tar.gz
            rm -f /tmp/ui-image.tar.gz

            docker compose up -d frontend
            sleep 3
            docker compose ps frontend
            echo "Frontend deploy success!"
